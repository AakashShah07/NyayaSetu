server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://node-api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Uploads proxy
    location /uploads/ {
        proxy_pass http://node-api:5000;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
