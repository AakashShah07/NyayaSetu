version: '3.8'

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: nyayasetu

  node-api:
    build: ./backend/node-api
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - python-nlp
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/nyayasetu
      - JWT_SECRET=nyayasetu_docker_secret_change_in_production
      - JWT_EXPIRE=7d
      - REFRESH_TOKEN_EXPIRE=30d
      - NLP_SERVICE_URL=http://python-nlp:8001
    volumes:
      - uploads:/app/uploads

  python-nlp:
    build: ./backend/python-nlp
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=production
      - TESSERACT_CMD=/usr/bin/tesseract

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - node-api

volumes:
  mongo_data:
  uploads:
